services:
  - type: web
    name: crm-backend
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 24h
      - key: FRONTEND_URL
        sync: false          # you'll paste your Vercel URL here after deploying frontend
      - key: CORS_ORIGIN
        sync: false          # same as FRONTEND_URL

databases:
  - name: crm-db
    databaseName: crm_manager
    plan: free
